name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-binary:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            rust_target: x86_64-unknown-linux-musl
            exe_ext: ""
            cross: false
            build_dir: target
          - os: ubuntu-latest
            target: linux-arm64
            rust_target: aarch64-unknown-linux-musl
            exe_ext: ""
            cross: true
            build_dir: target-cross
          - os: macos-15-intel
            target: macos-x86_64
            rust_target: x86_64-apple-darwin
            exe_ext: ""
            cross: false
            build_dir: target
          - os: macos-latest
            target: macos-arm64
            rust_target: aarch64-apple-darwin
            exe_ext: ""
            cross: false
            build_dir: target

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install musl tools (Linux)
        if: ${{ contains(matrix.rust_target, 'linux-musl') && !matrix.cross }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends -o Acquire::Retries=3 musl-tools

      - name: Install cross (ARM Linux)
        if: ${{ matrix.cross }}
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        if: ${{ !matrix.cross }}

      - name: Build cbor binary (native)
        if: ${{ !matrix.cross }}
        shell: bash
        run: cargo build --release --locked --target ${{ matrix.rust_target }} -p cbor2-cli --bin cbor

      - name: Build cbor binary (cross)
        if: ${{ matrix.cross }}
        shell: bash
        run: cross build --release --locked --target-dir ${{ matrix.build_dir }} --target ${{ matrix.rust_target }} -p cbor2-cli --bin cbor

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p release
          cp "${{ matrix.build_dir }}/${{ matrix.rust_target }}/release/cbor${{ matrix.exe_ext }}" "release/cbor-${{ matrix.target }}${{ matrix.exe_ext }}"
          ls -lah release

      - name: Generate checksums
        shell: bash
        run: |
          for file in release/*; do
            if command -v sha256sum >/dev/null 2>&1; then
              hash="$(sha256sum "$file" | awk '{print $1}')"
            elif command -v shasum >/dev/null 2>&1; then
              hash="$(shasum -a 256 "$file" | awk '{print $1}')"
            else
              hash="$(openssl dgst -sha256 "$file" | awk '{print $NF}')"
            fi
            echo "$hash  $(basename "$file")" > "${file}.sha256"
          done

          ls -lah release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: release/*
          if-no-files-found: error

  release:
    needs: build-binary
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*

      - name: Publish Homebrew formula
        env:
          CHECKSUM_DIR: release
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: scripts/publish-homebrew.sh "${{ github.ref_name }}"
